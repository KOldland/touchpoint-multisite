name: integration:paid-adapters

# PAID-07 — Paid Adapter Integration CI
# Runs the full PAID unit + integration test suite, the golden fixture check,
# and the golden fixture verification script on every push/PR touching paid
# adapter source, tests, fixtures, contracts, or scripts.

on:
  push:
    branches: [main, staging]
    paths:
      - 'app/public/wp-content/plugins/kh-smma/src/Adapters/**'
      - 'app/public/wp-content/plugins/kh-smma/src/Reconciliation/**'
      - 'app/public/wp-content/plugins/kh-smma/tests/Paid/**'
      - 'app/public/wp-content/plugins/kh-smma/tests/integration/**'
      - 'app/public/wp-content/plugins/kh-smma/tests/smoke/**'
      - 'app/public/wp-content/plugins/kh-smma/tests/fixtures/golden/**'
      - 'docs/contracts/paid_*.json'
      - 'scripts/verify_golden_fixtures.php'
      - 'scripts/paid_adapter_golden_check.php'
      - '.github/workflows/integration-paid-adapters.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'app/public/wp-content/plugins/kh-smma/src/Adapters/**'
      - 'app/public/wp-content/plugins/kh-smma/src/Reconciliation/**'
      - 'app/public/wp-content/plugins/kh-smma/tests/Paid/**'
      - 'app/public/wp-content/plugins/kh-smma/tests/integration/**'
      - 'app/public/wp-content/plugins/kh-smma/tests/smoke/**'
      - 'app/public/wp-content/plugins/kh-smma/tests/fixtures/golden/**'
      - 'docs/contracts/paid_*.json'
      - 'scripts/verify_golden_fixtures.php'
      - 'scripts/paid_adapter_golden_check.php'
      - '.github/workflows/integration-paid-adapters.yml'

jobs:
  # ── Job 1: PAID unit + integration tests ─────────────────────────────────
  paid-tests:
    name: PAID Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.1', '8.2']
      fail-fast: false

    env:
      KH_SMMA_TEST_MODE: ci
      KH_AD_ADAPTER_MODE: sandbox
      CI: true
      # Ensure no real credentials leak into CI
      KH_SFTP_HOST: ''
      KH_SFTP_USER: ''
      KH_SFTP_PORT: '22'
      KH_SFTP_REMOTE_PATH: '/settlements/'
      KH_ACCOUNTING_API_URL: ''
      KH_AD_DELIVERY_ADAPTER: sftp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, json, mysqli
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        working-directory: app/public/wp-content/plugins/kh-smma
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        working-directory: app/public/wp-content/plugins/kh-smma
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Assert no real credentials in environment
        run: |
          for var in KH_SFTP_HOST KH_SFTP_USER KH_ACCOUNTING_API_URL; do
            val="${!var}"
            if [ -n "$val" ]; then
              echo "ERROR: $var must be empty in CI (got: $val)"
              exit 1
            fi
          done
          echo "✓ No real credentials detected"

      - name: PHPUnit — PAID unit tests
        working-directory: app/public/wp-content/plugins/kh-smma
        run: |
          vendor/bin/phpunit tests/Paid/ --testdox --colors=always

      - name: PHPUnit — PAID integration tests
        working-directory: app/public/wp-content/plugins/kh-smma
        run: |
          vendor/bin/phpunit tests/integration/ --testdox --colors=always

      - name: PHPUnit — Legacy PAID adapter tests
        working-directory: app/public/wp-content/plugins/kh-smma
        run: |
          vendor/bin/phpunit tests/PaidAdaptersTest.php tests/ManualExportAdapterTest.php \
            --testdox --colors=always

      - name: PHPUnit — Full PAID suite
        working-directory: app/public/wp-content/plugins/kh-smma
        run: |
          vendor/bin/phpunit \
            tests/Paid/ tests/integration/ \
            tests/PaidAdaptersTest.php tests/ManualExportAdapterTest.php \
            --testdox --colors=always

      - name: Sandbox safety — assert no live secrets consumed
        working-directory: app/public/wp-content/plugins/kh-smma
        run: |
          vendor/bin/phpunit tests/Paid/SandboxSafetyTest.php \
            --testdox --colors=always
        env:
          KH_AD_ADAPTER_MODE: sandbox
          KH_SMMA_TEST_MODE: ci
          STRIPE_SECRET_KEY: sk_live_SENTINEL
          LINKEDIN_ACCESS_TOKEN: "urn:li:accessToken:SENTINEL"
          GOOGLE_ADS_TOKEN: ya29.SENTINEL
          GOOGLE_ADS_DEVELOPER_TOKEN: dev.SENTINEL
          KH_SFTP_HOST: sftp.sentinel.invalid
          KH_ACCOUNTING_API_URL: "https://sentinel.invalid/accounting"

  # ── Job 2: Golden fixture verification ───────────────────────────────────
  golden-fixtures:
    name: Golden Fixture Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, json
          coverage: none

      - name: Verify golden fixture checksums and metadata
        run: php scripts/verify_golden_fixtures.php

      - name: Validate fixture JSON syntax
        run: |
          echo "Validating all golden fixture JSON files..."
          ERRORS=0
          for f in app/public/wp-content/plugins/kh-smma/tests/fixtures/golden/*.json; do
            if php -r "
              \$data = json_decode(file_get_contents('$f'), true);
              if (json_last_error() !== JSON_ERROR_NONE) {
                fwrite(STDERR, 'Invalid JSON: $f\n');
                exit(1);
              }
            " 2>/dev/null; then
              echo "✓ $(basename $f)"
            else
              echo "✗ $(basename $f) — invalid JSON"
              ERRORS=$((ERRORS + 1))
            fi
          done
          [ $ERRORS -eq 0 ] || exit 1
          echo "✓ All fixture JSON files are valid"

      - name: Secret scan on golden fixtures
        run: |
          echo "Scanning golden fixtures for secrets..."
          php -r "
          \$patterns = [
            '/sk_(live|test)_[A-Za-z0-9]+/',
            '/whsec_[A-Za-z0-9]+/',
            '/-----BEGIN (RSA|EC|OPENSSH|PRIVATE) KEY-----/',
            '/\bAKIA[0-9A-Z]{16}\b/',
            '/\bBearer\s+[A-Za-z0-9\-._~+\/]+=*/i',
          ];
          \$dir = 'app/public/wp-content/plugins/kh-smma/tests/fixtures/golden';
          \$files = glob(\"\$dir/*.json\");
          \$found = 0;
          foreach (\$files as \$file) {
            \$content = file_get_contents(\$file);
            foreach (\$patterns as \$p) {
              if (preg_match(\$p, \$content)) {
                fwrite(STDERR, 'SECRET DETECTED in ' . basename(\$file) . '\n');
                \$found++;
              }
            }
          }
          if (\$found > 0) exit(1);
          echo 'No secrets detected in golden fixtures.' . PHP_EOL;
          "

      - name: Run golden check script
        run: php scripts/paid_adapter_golden_check.php
        env:
          KH_AD_ADAPTER_MODE: sandbox
          KH_SMMA_TEST_MODE: ci

      - name: Upload golden-summary.json artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-summary-php${{ github.sha }}
          path: golden-summary.json
          retention-days: 30

  # ── Job 2b: PAID-08 reconciliation tests ─────────────────────────────────
  reconciliation-tests:
    name: Reconciliation Run Tests
    runs-on: ubuntu-latest
    needs: [paid-tests]

    env:
      KH_SMMA_TEST_MODE: ci
      KH_AD_ADAPTER_MODE: sandbox
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, json, mysqli
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: app/public/wp-content/plugins/kh-smma
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPUnit — PAID-08 unit tests
        working-directory: app/public/wp-content/plugins/kh-smma
        run: |
          vendor/bin/phpunit tests/Paid/ReconciliationRunServiceTest.php --testdox --colors=always

      - name: PHPUnit — PAID-08 integration tests
        working-directory: app/public/wp-content/plugins/kh-smma
        run: |
          vendor/bin/phpunit tests/integration/PaidReconciliationIntegrationTest.php --testdox --colors=always

      - name: Upload reconciliation summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paid-reconciliation-summary-${{ github.sha }}
          path: paid_reconciliation_summary.json
          if-no-files-found: ignore
          retention-days: 30

  # ── Job 3: Paid adapter smoke test ───────────────────────────────────────
  smoke-test:
    name: Paid Adapter Smoke Test
    runs-on: ubuntu-latest
    needs: [golden-fixtures, reconciliation-tests]

    env:
      KH_AD_ADAPTER_MODE: sandbox
      KH_SMMA_TEST_MODE: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, json
          coverage: none

      - name: Install Composer dependencies
        working-directory: app/public/wp-content/plugins/kh-smma
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run paid adapter smoke test
        working-directory: app/public/wp-content/plugins/kh-smma
        run: php tests/smoke/paid_adapter_smoke.php

  # ── Job 4: Full E2E signoff smoke ─────────────────────────────────────────
  signoff-smoke:
    name: Full PAID E2E Signoff Smoke
    runs-on: ubuntu-latest
    needs: [smoke-test]

    env:
      KH_AD_ADAPTER_MODE: sandbox
      KH_SMMA_TEST_MODE: ci
      KH_SFTP_HOST: ''
      KH_SFTP_USER: ''
      KH_ACCOUNTING_API_URL: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, json
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: app/public/wp-content/plugins/kh-smma
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run full E2E signoff smoke
        working-directory: app/public/wp-content/plugins/kh-smma
        run: php ../../../../../../scripts/paid_end_to_end_smoke.php

      - name: Upload E2E evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paid-e2e-evidence-${{ github.sha }}
          path: app/public/wp-content/plugins/kh-smma/paid_end_to_end_evidence.json
          if-no-files-found: ignore
          retention-days: 30

  # ── Summary ───────────────────────────────────────────────────────────────
  report:
    name: PAID Integration Report
    runs-on: ubuntu-latest
    needs: [paid-tests, golden-fixtures, reconciliation-tests, smoke-test, signoff-smoke]
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "# PAID Adapter Integration Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PAID Tests | ${{ needs.paid-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Golden Fixtures | ${{ needs.golden-fixtures.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reconciliation Tests | ${{ needs.reconciliation-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Signoff Smoke | ${{ needs.signoff-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- PAID unit tests: 120 tests (PAID-03 through bucket closeout)" >> $GITHUB_STEP_SUMMARY
          echo "- Reconciliation run tests: 16 tests (PAID-08)" >> $GITHUB_STEP_SUMMARY
          echo "- Golden fixtures: 21 fixtures (CIC-governed)" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke test: end-to-end sandbox flow (dry_run → execute → reconcile → settle → deliver)" >> $GITHUB_STEP_SUMMARY
          echo "- Signoff smoke: full 6-phase E2E evidence run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artefacts" >> $GITHUB_STEP_SUMMARY
          echo "- \`golden-summary.json\` — adapter output vs fixture diff report" >> $GITHUB_STEP_SUMMARY
