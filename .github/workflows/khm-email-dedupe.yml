name: KHM Email Dedupe

on:
  pull_request:
    branches: [main, staging, integration/hardening]
    paths:
      - 'app/public/wp-content/plugins/khm-plugin/src/Migrations/EnhancedEmailMigration.php'
      - 'app/public/wp-content/plugins/khm-plugin/src/Services/EnhancedEmailService.php'
      - 'app/public/wp-content/plugins/khm-plugin/tests/Services/EnhancedEmailServiceDedupeTest.php'
      - 'migrations/20260307_add_email_idempotency_index.sql'
      - '.github/workflows/khm-email-dedupe.yml'

jobs:
  email-dedupe:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, json
          coverage: none
          tools: composer:v2

      - name: Install plugin dependencies
        working-directory: app/public/wp-content/plugins/khm-plugin
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run email dedupe tests
        run: |
          vendor/bin/phpunit -c app/public/wp-content/plugins/khm-plugin/phpunit.xml \
            app/public/wp-content/plugins/khm-plugin/tests/Services/EnhancedEmailServiceDedupeTest.php
